{% load compress %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rainfall Chart</title>
    <link rel="icon" type="image/x-icon" href="{% static 'main/iconPL.ico' %}">
    {% load bootstrap5 %}
    {% bootstrap_css %}
    {% bootstrap_javascript %}
    <style>
        .chart-container {
            width: 450px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Rainfall Chart</h1>
    <div>
        <label for="chartTypeSelect">Select Chart Type:</label>
        <select id="chartTypeSelect" class="form-select">
            <option value="line">Line Chart</option>
            <option value="spline">Spline Chart</option>
            <option value="bar">Bar Chart</option>
        </select>
    </div>
    <div class="chart-container">
        <div id="canvas" class="d-flex align-content-start flex-wrap justify-content-between">
            <div id="chart-spinner-container" class="text-center" style="width: 400px; height: 400px; display: none;">
                <div class="spinner-border" role="status">
                    <span class="sr-only"></span>
                </div>
                <div id="chart-loading-message">Graph is being loaded...</div>
            </div>
        </div>
        <div class="d-grid gap-2">
            <button id="download" class="btn btn-primary mt-3">Download Chart as Image</button>
        </div>
    </div>

    <script>
        let rainfallChart = null;
        let rainfallData = [];
        let timestamps = [];
        
        document.addEventListener("DOMContentLoaded", function() {
            const channelId = "{{ channel_id }}";
            const startDate = "{{ start_date }}";
            const endDate = "{{ end_date }}";
        
            document.getElementById('chart-spinner-container').style.display = 'block';
            document.getElementById('download').style.display = 'none';
            const url = isLive
                ? `https://rathe-russell-proterandrous.ngrok-free.dev/mychannel/rainfall_data/${channelId}/all/`
                : `https://rathe-russell-proterandrous.ngrok-free.dev/mychannel/rainfall_data/${channelId}/${startDate}/${endDate}/`;
            fetch(url, {
                headers: { 'ngrok-skip-browser-warning': 'true' }
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('download').style.display = 'block';
                document.getElementById('chart-spinner-container').style.display = 'none';
                rainfallData = data.rainfall_values || [];
                timestamps = data.timestamps || [];
                const rainfallCanvasContainer = document.createElement('div');
                rainfallCanvasContainer.className = 'canvas-container';
                const rainfallCanvas = document.createElement('canvas');
                rainfallCanvas.id = 'rainfallChart';
                rainfallCanvas.width = 450;
                rainfallCanvas.height = 400;
                rainfallCanvasContainer.appendChild(rainfallCanvas);
                document.getElementById('canvas').appendChild(rainfallCanvasContainer);
                rainfallChart = createChart('rainfallChart', rainfallData, timestamps, 'Rainfall Value');
            })
            .catch(error => {
                console.error('Error fetching chart data:', error);
                document.getElementById('chart-spinner-container').style.display = 'none';
            });
        
            document.getElementById('chartTypeSelect').addEventListener('change', function() {
                if (rainfallChart) {
                    rainfallChart = createChart('rainfallChart', rainfallData, timestamps, 'Rainfall Value', this.value);
                }
            });
        });
        
        function createChart(canvasId, data, labels, label, type = 'line') {
            const chartType = type === 'spline' ? 'line' : type;
            const config = {
                type: chartType,
                data: {
                    labels: labels,
                    datasets: [{
                        label: label,
                        data: data,
                        fill: false,
                        borderColor: 'rgb(75, 192, 192)',
                        backgroundColor: chartType === 'bar' ? 'rgba(255, 99, 132, 0.2)' : 'rgb(75, 192, 192)',
                    }]
                },
                options: {
                    elements: {
                        line: {
                            tension: type === 'spline' ? 0.4 : 0.1
                        }
                    },
                    scales: {
                        y: { beginAtZero: false },
                        x: {
                            ticks: {
                                maxRotation: 90,
                                minRotation: 80
                            }
                        }
                    },
                    responsive: false,
                    maintainAspectRatio: false
                }
            };
            const canvas = document.getElementById(canvasId);
            const chartInstance = Chart.getChart(canvas);
            if (chartInstance) {
                chartInstance.destroy();
            }
            return new Chart(canvas, config);
        }
        
        document.getElementById('download').addEventListener('click', function() {
            const canvas = document.getElementById('rainfallChart');
            canvas.toBlob(function(blob) {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'chart.jpeg';
                link.click();
            }, 'image/jpeg');
        });

        const wsApiKey = "{{ API }}";
        if (wsApiKey) {
            const socket = new WebSocket('wss://jzngfcdfgl.execute-api.ap-southeast-2.amazonaws.com/production/');
            socket.onopen = function() {
                socket.send(JSON.stringify({ action: 'setAPI', api: wsApiKey }));
            };
            socket.onmessage = function(event) {
                const msg = JSON.parse(event.data);
                if (msg.privateMessage && msg.privateMessage.sensor_type === 'rainfall_sensor') {
                    if (rainfallChart) {
                        rainfallChart.data.labels.push(msg.privateMessage.timestamp);
                        rainfallChart.data.datasets[0].data.push(parseFloat(msg.privateMessage.rainfall_value));
                        rainfallChart.update();
                    }
                }
            };
        }

    </script>
</body>
</html>
