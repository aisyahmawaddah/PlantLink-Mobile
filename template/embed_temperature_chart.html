{% load compress %} 
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Chart</title>
    <link rel="icon" type="image/x-icon" href="{% static 'main/iconPL.ico' %}">
    {% load bootstrap5 %}
    {% bootstrap_css %}
    {% bootstrap_javascript %}
    <style>
        .chart-container {
            width: 450px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Temperature Chart</h1>
    <div>
        <label for="chartTypeSelect">Select Chart Type:</label>
        <select id="chartTypeSelect" class="form-select">
            <option value="line">Line Chart</option>
            <option value="spline">Spline Chart</option>
            <option value="bar">Bar Chart</option>
        </select>
    </div>
    <div class="chart-container">
        <div id="canvas" class="d-flex align-content-start flex-wrap justify-content-between">
            <div id="chart-spinner-container" class="text-center" style="width: 400px; height: 400px; display: none;">
                <div class="spinner-border" role="status">
                    <span class="sr-only"></span>
                </div>
                <div id="chart-loading-message">Graph is being loaded...</div>
            </div>
        </div>
        <div class="d-grid gap-2">
            <!-- <button id="real-time" class="btn btn-primary mt-3" type="button">Real Time</button> -->
            <button id="download" class="btn btn-primary mt-3">Download Chart as Image</button>
            <!-- <div id="fb-root"></div>
            <script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_GB/sdk.js#xfbml=1&version=v20.0" nonce="6wGNTbvk"></script>
            <div class="fb-share-button" data-href="https://shiroooo.pythonanywhere.com/mychannel/embed/channel/{{ channel_id }}/" data-layout="" data-size="">
                <a target="_blank" href="https://www.facebook.com/sharer/sharer.php?u=https%3A%2F%2Fshiroooo.pythonanywhere.com%2Fmychannel%2F{{ channel_id }}%2Fshared_dashboard%2F&amp;src=sdkpreparse" class="fb-xfbml-parse-ignore">Share</a>
            </div> -->
        </div>
    </div>

    <script>
        let temperatureChart = null;
        let temperatureData = [];
        let timestamps_temp_humid = [];
        
        document.addEventListener("DOMContentLoaded", function() {
            const channelId = "{{ channel_id }}";
            const startDate = "{{ start_date }}";
            const endDate = "{{ end_date }}";
        
            document.getElementById('chart-spinner-container').style.display = 'block';
            document.getElementById('download').style.display = 'none';
            const url = `https://rathe-russell-proterandrous.ngrok-free.dev/mychannel/humidity_temperature/${channelId}/${startDate}/${endDate}/`;
            fetch(url, {
                headers: { 'ngrok-skip-browser-warning': 'true' }
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('download').style.display = 'block';
                document.getElementById('chart-spinner-container').style.display = 'none';
                temperatureData = data.temp_values || [];
                timestamps_temp_humid = data.timestamps_humid_temp || [];
                const temperatureCanvasContainer = document.createElement('div');
                temperatureCanvasContainer.className = 'canvas-container';
                const temperature = document.createElement('canvas');
                temperature.id = 'temperatureChart';
                temperature.width = 450;
                temperature.height = 400;
                temperatureCanvasContainer.appendChild(temperature);
                document.getElementById('canvas').appendChild(temperatureCanvasContainer);
                temperatureChart = createChart('temperatureChart', temperatureData, timestamps_temp_humid, 'Temperature Value');
            })
            .catch(error => {
                console.error('Error fetching chart data:', error);
                document.getElementById('chart-spinner-container').style.display = 'none';
            });
        
            document.getElementById('chartTypeSelect').addEventListener('change', function() {
                if (temperatureChart) {
                    temperatureChart = createChart('temperatureChart', temperatureData, timestamps_temp_humid, 'Temperature Value', this.value);
                }
            });
        });
        
        function createChart(canvasId, data, labels, label, type = 'line') {
            const chartType = type === 'spline' ? 'line' : type;
            const config = {
                type: chartType,
                data: {
                    labels: labels,
                    datasets: [{
                        label: label,
                        data: data,
                        fill: false,
                        borderColor: 'rgb(75, 192, 192)',
                        backgroundColor: chartType === 'bar' ? 'rgba(255, 99, 132, 0.2)' : 'rgb(75, 192, 192)',
                    }]
                },
                options: {
                    elements: {
                        line: {
                            tension: type === 'spline' ? 0.4 : 0.1
                        }
                    },
                    scales: {
                        y: { beginAtZero: false },
                        x: {
                            ticks: {
                                maxRotation: 90,
                                minRotation: 80
                            }
                        }
                    },
                    responsive: false,
                    maintainAspectRatio: false
                }
            };
            const canvas = document.getElementById(canvasId);
            const chartInstance = Chart.getChart(canvas);
            if (chartInstance) {
                chartInstance.destroy();
            }
            return new Chart(canvas, config);
        }
        
        document.getElementById('download').addEventListener('click', function() {
            const canvas = document.getElementById('temperatureChart');
            canvas.toBlob(function(blob) {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'chart.jpeg';
                link.click();
            }, 'image/jpeg');
        });
    </script>
</body>
</html>
